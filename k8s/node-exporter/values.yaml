# Prometheus Node Exporter values
fullnameOverride: node-exporter

# minikube is a single control-plane node; tolerate it so DaemonSet schedules.
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9100"

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi
