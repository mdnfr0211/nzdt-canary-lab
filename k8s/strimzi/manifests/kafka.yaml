apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  labels:
    app.kubernetes.io/part-of: event-platform
spec:
  kafka:
    version: "4.1.0"
    metricsConfig:
      type: jmxPrometheusExporter
      valueFrom:
        configMapKeyRef:
          name: kafka-metrics-config
          key: kafka-metrics-config.yml
    template:
      pod:
        metadata:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9404"
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: controller
        port: 9093
        type: internal
        tls: true
    config:
      "auto.create.topics.enable": "false"
      "offsets.topic.replication.factor": "1"
      "transaction.state.log.replication.factor": "1"
      "transaction.state.log.min.isr": "1"
      "default.replication.factor": "1"
      "min.insync.replicas": "1"
      "inter.broker.protocol.version": "4.1"
      "log.message.format.version": "4.1"
  entityOperator:
    topicOperator: {}
  # kafka-exporter exposes consumer-group lag and per-topic/partition offset
  # metrics that the JMX exporter does NOT provide. It serves Prometheus metrics
  # on port 9404; annotate the pod so the ADOT pod-SD scrape job picks it up.
  kafkaExporter:
    topicRegex: ".*"
    groupRegex: ".*"
    template:
      pod:
        metadata:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "9404"
