apiVersion: kafka.strimzi.io/v1
kind: Kafka
metadata:
  name: my-cluster
  labels:
    app.kubernetes.io/part-of: event-platform
spec:
  kafka:
    version: "3.9.0"
    replicas: 1
    roles:
      - controller
      - broker
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false
      - name: controller
        port: 9093
        type: internal
        tls: true
        controller: true
    storage:
      type: ephemeral
    config:
      "auto.create.topics.enable": "false"
      "offsets.topic.replication.factor": "1"
      "transaction.state.log.replication.factor": "1"
      "transaction.state.log.min.isr": "1"
      "default.replication.factor": "1"
      "min.insync.replicas": "1"
      "inter.broker.protocol.version": "3.9"
      "log.message.format.version": "3.9"
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: "1"
        memory: 1Gi
  entityOperator:
    topicOperator:
      autoCreateTopicEnable: false
