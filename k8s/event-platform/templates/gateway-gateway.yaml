{{- $ns := include "event-platform.namespace" . -}}

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: event-gateway-gateway
  namespace: {{ $ns }}
  labels:
    {{- include "event-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  selector:
    istio: gateway   # matches the istio-gateway Deployment installed by k8s/istio/values-gateway.yaml
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - "*"
