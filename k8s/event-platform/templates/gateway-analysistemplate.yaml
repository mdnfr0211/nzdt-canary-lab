{{- $ns := include "event-platform.namespace" . -}}

apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: gateway-5xx-rate
  namespace: {{ $ns }}
  labels:
    {{- include "event-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: gateway
spec:
  metrics:
    - name: gateway-5xx-rate
      interval: 30s
      count: 5
      successCondition: {{ .Values.gateway.analysis.successCondition | quote }}
      provider:
        prometheus:
          address: {{ .Values.metrics.vmAddress | quote }}
          query: |
            sum(rate(istio_requests_total{reporter="destination",destination_workload="event-gateway",response_code=~"5.."}[2m]))
            /
            clamp_min(sum(rate(istio_requests_total{reporter="destination",destination_workload="event-gateway"}[2m])), 1)
