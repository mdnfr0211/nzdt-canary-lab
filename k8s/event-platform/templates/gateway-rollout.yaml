{{- $ns := include "event-platform.namespace" . -}}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: event-gateway
  namespace: {{ $ns }}
  labels:
    {{- include "event-platform.labels" . | nindent 4 }}
  annotations:
    notifications.argoproj.io/subscribe.on-rollout-aborted.{{ .Values.notifications.service }}: ""
    notifications.argoproj.io/subscribe.on-analysis-run-failed.{{ .Values.notifications.service }}: ""
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "event-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gateway
  strategy:
    canary:
      stableService: event-gateway-stable
      canaryService: event-gateway-canary
      trafficRouting:
        istio:
          virtualService:
            name: event-gateway
            routes:
              - primary
      steps:
        {{- toYaml .Values.gateway.canarySteps | nindent 8 }}
      analysis:
        templates:
          - templateName: gateway-5xx-rate
          - templateName: worker-error-rate
        startingStep: 0
  template:
    metadata:
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /stats/prometheus
        prometheus.io/port: "15020"
      labels:
        {{- include "event-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gateway
    spec:
      serviceAccountName: event-gateway-sa
      containers:
        - name: event-gateway
          image: {{ include "event-platform.gatewayImage" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KAFKA_BROKERS
              value: {{ .Values.kafka.brokers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: LISTEN_ADDR
              value: ":8080"
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
