fullnameOverride: adot-collector

mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.110.0"
  pullPolicy: IfNotPresent

serviceAccount:
  create: true

# kubernetes_sd requires cluster-wide read access to pods, services and endpoints.
clusterRole:
  create: true
  name: adot-collector
  rules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
      verbs: ["get", "list", "watch"]

configMap:
  create: true

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317

    prometheus:
      config:
        scrape_configs:
          - job_name: kubernetes-pods
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names:
                    - kafka
                    - monitoring
                    - app
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                action: keep
                regex: "true"
              # Istio injects prometheus.io/scrape on app pods pointing to the Envoy sidecar (port 15020/15090).
              # Drop those targets to avoid high-cardinality envoy_* metrics; gateway/worker already push OTLP.
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
                action: drop
                regex: "15020|15090"
              - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                action: replace
                target_label: __metrics_path__
                regex: (.+)
              - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
                action: replace
                regex: ([^:]+)(?::\d+)?;(\d+)
                replacement: $1:$2
                target_label: __address__
              # Expose namespace + pod name as metric labels (Strimzi Grafana dashboard
              # filters on `namespace` and `kubernetes_pod_name`).
              - source_labels: [__meta_kubernetes_namespace]
                action: replace
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                action: replace
                target_label: kubernetes_pod_name
              # Map Strimzi pod labels -> metric labels used by the official dashboard
              # (`strimzi_io_cluster`, `strimzi_io_name`, `strimzi_io_kind`).
              - source_labels: [__meta_kubernetes_pod_label_strimzi_io_cluster]
                action: replace
                target_label: strimzi_io_cluster
                regex: (.+)
              - source_labels: [__meta_kubernetes_pod_label_strimzi_io_name]
                action: replace
                target_label: strimzi_io_name
                regex: (.+)
              - source_labels: [__meta_kubernetes_pod_label_strimzi_io_kind]
                action: replace
                target_label: strimzi_io_kind
                regex: (.+)

  processors:
    resource:
      attributes:
        - key: service.name
          action: upsert
          from_attribute: service.name
        - key: service.version
          action: upsert
          from_attribute: service.version
    batch:
      timeout: 5s
      send_batch_size: 1024

  exporters:
    prometheusremotewrite:
      endpoint: http://vmsingle-server.monitoring.svc:8428/api/v1/write
      resource_to_telemetry_conversion:
        enabled: true

  extensions:
    health_check: {}

  service:
    extensions: [health_check]
    pipelines:
      metrics:
        receivers: [otlp, prometheus]
        processors: [resource, batch]
        exporters: [prometheusremotewrite]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
